name: Api Gateway CI

on:
    push:
        branches:
          - main
          - dev
          - "feat/*"
          - "fix/*"


    pull_request:
       branches:
         - dev
         - main

jobs:
     build:
         runs-on: ubuntu-latest

         steps:
           # STEP 1: Checkout repository
           - name: Checkout code
             uses: actions/checkout@v6

          # STEP 2: Set up JDK
           - name: Set up JDK 21
             uses: actions/setup-java@v5
             with:
               java-version: "21"
               distribution: "temurin"
               cache: maven

          # STEP 3: Download maven dependencies
           - name: Download Maven dependencies
             uses: mvn dependency:go-offline -B

          # STEP 6: Build the app to confirm everything is OK.
           - name: Build with Maven
             uses: mvn -B package --file pom.xml
