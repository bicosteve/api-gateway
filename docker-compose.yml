services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: api-gateway-dev
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-5001}:${APP_PORT:-5001}"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:mysql://mysql:3306/${DB_NAME:-sportsbook}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - .:/app
      - maven-cache:/home/usr/.m2
    networks:
      - api-gateway-net
    command: mvn spring-boot:run -Dspring-boot.run.profiles=dev

  mysql:
    image: mysql:8.0
    container_name: api-gateway-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-sportsbook}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - api-gateway-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.0
    container_name: api-gateway-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    networks:
      - api-gateway-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  api-gateway-net:
    name: api-gateway-net

volumes:
  mysql-data:
  redis-data:
  maven-cache:
