name: Api Gateway CI

on:
  push:
    branches:
      - main
      - dev
      - "feat/*"
      - "fix/*"
  pull_request:
    branches:
      - dev
      - main

# ── Shared env vars used across all jobs ──
env:
  DB_URL: jdbc:mysql://127.0.0.1:3306/sportsbook?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
  DB_USERNAME: root
  DB_PASSWORD: root
  DB_DRIVER: com.mysql.cj.jdbc.Driver
  SQL_MODE: always
  APP_LOGGING: INFO
  LOGGING_LEVEL: INFO
  REDIS_HOST: 127.0.0.1
  REDIS_PORT: 6379
  ACCESS_TOKEN_EXPIRATION: 3600000
  REFRESH_TOKEN_EXPIRATION: 604800000
  DOCKER_IMAGE_NAME: api-gateway

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sportsbook
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7.0
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Wait for MySQL
        run: |
          echo "Waiting for MySQL..."
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -proot --silent; then
              echo "MySQL is ready"
              break
            fi
            echo "Attempt $i..."
            sleep 2
          done

      - name: Run Tests
        run: |
          echo "=== Running Tests ==="

          mvn clean test \
            -Dmaven.test.failure.ignore=true \
            -B \
            --file pom.xml \
            2>&1 | tee test-output.log

          echo "=== Test Execution Complete ==="
        env:
          APP_PORT: ${{ secrets.APP_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MAILGUN_BASE_URL: ${{ secrets.MAILGUN_BASE_URL }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_SANDBOX: ${{ secrets.MAILGUN_SANDBOX }}
          MAILGUN_FROM: ${{ secrets.MAILGUN_FROM }}

          CHAPA_BASE_URL: ${{ secrets.CHAPA_BASE_URL }}
          CHAPA_SECRET_KEY: ${{ secrets.CHAPA_SECRET_KEY }}
          CHAPA_WEBHOOK_SECRET: ${{ secrets.CHAPA_WEBHOOK_SECRET }}
          CHAPA_CURRENCY: ETB
          CHAPA_CALLBACK_URL: http://localhost:8080/api/wallet/webhook/chapa
          CHAPA_RETURN_URL: http://localhost:3000/deposit/success

      - name: List XML Reports
        run: |
          find target/surefire-reports -name "*.xml"

      - name: Dump test counts
        run: |
          grep -R "tests=" target/surefire-reports/*.xml

      - name: Show Surefire Reports
        if: always()
        run: |
          echo "=== SUREFIRE REPORT FILES ==="
          find target/surefire-reports -type f || true

          echo ""
          echo "=== XML TEST SUMMARY ==="

          for f in target/surefire-reports/TEST-*.xml; do
            echo ""
            echo "FILE: $f"
            grep "<testsuite " "$f" || true
          done

      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  quality-gate:
    name: Quality Gate -- Needs 85% Pass Rate
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download test reports
        uses: actions/download-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      - name: Evaluate test pass rate
        run: |
          MIN_PASS_RATE=85
          REPORTS_DIR="target/surefire-reports"

          echo "=== Scanning test reports ==="

          TOTAL_TESTS=0
          TOTAL_FAILURES=0
          TOTAL_ERRORS=0

          for xml in "$REPORTS_DIR"/TEST-*.xml; do
            [ -f "$xml" ] || continue

            # Only count REAL executed suites (tests > 0)
            TESTS=$(awk -F'tests="' '/tests="/ {split($2,a,"\""); if (a[1] > 0) print a[1]}' "$xml" | awk '{sum+=$1} END {print sum+0}')
            FAILURES=$(awk -F'failures="' '/failures="/ {split($2,a,"\""); if (a[1] ~ /^[0-9]+$/) sum+=a[1]} END {print sum+0}' "$xml")
            ERRORS=$(awk -F'errors="' '/errors="/ {split($2,a,"\""); if (a[1] ~ /^[0-9]+$/) sum+=a[1]} END {print sum+0}' "$xml")

            TOTAL_TESTS=$((TOTAL_TESTS + TESTS))
            TOTAL_FAILURES=$((TOTAL_FAILURES + FAILURES))
            TOTAL_ERRORS=$((TOTAL_ERRORS + ERRORS))
          done

          PASSED=$((TOTAL_TESTS - TOTAL_FAILURES - TOTAL_ERRORS))

          if [ "$TOTAL_TESTS" -eq 0 ]; then
            echo "No valid tests detected"
            exit 1
          fi

          PASS_RATE=$((PASSED * 100 / TOTAL_TESTS))

          echo "────────────────────────────"
          echo "Total Tests : $TOTAL_TESTS"
          echo "Passed      : $PASSED"
          echo "Failures    : $TOTAL_FAILURES"
          echo "Errors      : $TOTAL_ERRORS"
          echo "Pass Rate   : ${PASS_RATE}%"
          echo "────────────────────────────"

          if [ "$PASS_RATE" -lt "$MIN_PASS_RATE" ]; then
            echo "Below threshold"
            exit 1
          fi

          echo "✅ Passed quality gate"

  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: quality-gate

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sportsbook
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7.0
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── STEP 2: Set up JDK ──
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      # ── STEP 3: Cache Maven dependencies ──
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── STEP 4: Build JAR ──
      - name: Build with Maven
        run: |
          echo "=== Building application ==="
          mvn -B package -DskipTests --file pom.xml
          echo "=== Build complete ==="
        env:
          APP_PORT: ${{ secrets.APP_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MAILGUN_BASE_URL: ${{ secrets.MAILGUN_BASE_URL }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_SANDBOX: ${{ secrets.MAILGUN_SANDBOX }}
          MAILGUN_FROM: ${{ secrets.MAILGUN_FROM }}
          CHAPA_BASE_URL: ${{ secrets.CHAPA_BASE_URL }}
          CHAPA_SECRET_KEY: ${{ secrets.CHAPA_SECRET_KEY }}
          CHAPA_WEBHOOK_SECRET: ${{ secrets.CHAPA_WEBHOOK_SECRET }}
          CHAPA_CURRENCY: ETB
          CHAPA_CALLBACK_URL: http://localhost:8080/api/wallet/webhook/chapa
          CHAPA_RETURN_URL: http://localhost:3000/deposit/success

      # ── STEP 5: Upload JAR artifact ──
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-jar
          path: target/*.jar
          retention-days: 7

  docker-image:
    name: Create Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE_NAME }}:latest

      - name: Verify Docker images exist locally
        run: |
          docker image inspect ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          docker image inspect ${{ env.DOCKER_IMAGE_NAME }}:latest

  push-dockerhub:
    name: Push Docker Image to Docker Hub
    runs-on: ubuntu-latest
    needs: docker-image
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push production Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [test, quality-gate, build, docker-image, push-dockerhub]
    if: always() # always runs to show final status

    steps:
      - name: Print pipeline result
        run: |
          echo "──────────────────────────────────────"
          echo "  🏁  Pipeline Summary"
          echo "──────────────────────────────────────"
          echo "  Test job        : ${{ needs.test.result }}"
          echo "  Quality gate    : ${{ needs.quality-gate.result }}"
          echo "  Build job       : ${{ needs.build.result }}"
          echo "  Docker image    : ${{ needs.docker-image.result }}"
          echo "  Docker Hub push : ${{ needs.push-dockerhub.result }}"
          echo "──────────────────────────────────────"
