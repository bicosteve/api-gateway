name: Api Gateway CI

on:
  push:
    branches:
      - main
      - dev
      - "feat/*"
      - "fix/*"
  pull_request:
    branches:
      - dev
      - main
    types:
      - opened
      - reopened
      - ready_for_review

env:
  DB_URL: jdbc:mysql://127.0.0.1:3306/sportsbook?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
  DB_USERNAME: root
  DB_PASSWORD: root
  DB_DRIVER: com.mysql.cj.jdbc.Driver
  SQL_MODE: always
  APP_LOGGING: INFO
  LOGGING_LEVEL: INFO
  REDIS_HOST: 127.0.0.1
  REDIS_PORT: 6379
  ACCESS_TOKEN_EXPIRATION: 3600000
  REFRESH_TOKEN_EXPIRATION: 604800000
  DOCKER_IMAGE_NAME: api-gateway

# ──────────────────────────────────────────────────────
# JOB 1: TEST — runs on ALL branches and PRs
# ──────────────────────────────────────────────────────
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sportsbook
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7.0
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Wait for MySQL
        run: |
          echo "Waiting for MySQL..."
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -u root -proot --silent; then
              echo "✅ MySQL is ready"
              break
            fi
            echo "Attempt $i..."
            sleep 2
          done

      - name: Run Tests
        run: |
          echo "=== Running Tests ==="
          mvn clean test \
            -Dmaven.test.failure.ignore=true \
            -B \
            --file pom.xml \
            2>&1 | tee test-output.log
          echo "=== Test Execution Complete ==="
        env:
          APP_PORT: ${{ secrets.APP_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MAILGUN_BASE_URL: ${{ secrets.MAILGUN_BASE_URL }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_SANDBOX: ${{ secrets.MAILGUN_SANDBOX }}
          MAILGUN_FROM: ${{ secrets.MAILGUN_FROM }}
          CHAPA_BASE_URL: ${{ secrets.CHAPA_BASE_URL }}
          CHAPA_SECRET_KEY: ${{ secrets.CHAPA_SECRET_KEY }}
          CHAPA_WEBHOOK_SECRET: ${{ secrets.CHAPA_WEBHOOK_SECRET }}
          CHAPA_CURRENCY: ETB
          CHAPA_CALLBACK_URL: http://localhost:8080/api/wallet/webhook/chapa
          CHAPA_RETURN_URL: http://localhost:3000/deposit/success

      - name: Show Surefire Reports
        if: always()
        run: |
          echo "=== XML TEST SUMMARY ==="
          for f in target/surefire-reports/TEST-*.xml; do
            echo ""
            echo "FILE: $f"
            grep "<testsuite " "$f" || true
          done

      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  # ──────────────────────────────────────────────────────
  # JOB 2: QUALITY GATE — runs on ALL branches and PRs
  # ──────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate -- Needs 85% Pass Rate
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download test reports
        uses: actions/download-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      - name: Evaluate test pass rate
        run: |
          MIN_PASS_RATE=85
          REPORTS_DIR="target/surefire-reports"

          echo "=== Scanning test reports ==="

          TOTAL_TESTS=0
          TOTAL_FAILURES=0
          TOTAL_ERRORS=0

          for xml in "$REPORTS_DIR"/TEST-*.xml; do
            [ -f "$xml" ] || continue
            TESTS=$(awk -F'tests="' '/tests="/ {split($2,a,"\""); if (a[1] > 0) print a[1]}' "$xml" | awk '{sum+=$1} END {print sum+0}')
            FAILURES=$(awk -F'failures="' '/failures="/ {split($2,a,"\""); if (a[1] ~ /^[0-9]+$/) sum+=a[1]} END {print sum+0}' "$xml")
            ERRORS=$(awk -F'errors="' '/errors="/ {split($2,a,"\""); if (a[1] ~ /^[0-9]+$/) sum+=a[1]} END {print sum+0}' "$xml")
            TOTAL_TESTS=$((TOTAL_TESTS + TESTS))
            TOTAL_FAILURES=$((TOTAL_FAILURES + FAILURES))
            TOTAL_ERRORS=$((TOTAL_ERRORS + ERRORS))
          done

          PASSED=$((TOTAL_TESTS - TOTAL_FAILURES - TOTAL_ERRORS))

          if [ "$TOTAL_TESTS" -eq 0 ]; then
            echo "❌ No valid tests detected"
            exit 1
          fi

          PASS_RATE=$((PASSED * 100 / TOTAL_TESTS))

          echo "────────────────────────────"
          echo "Total Tests : $TOTAL_TESTS"
          echo "Passed      : $PASSED"
          echo "Failures    : $TOTAL_FAILURES"
          echo "Errors      : $TOTAL_ERRORS"
          echo "Pass Rate   : ${PASS_RATE}%"
          echo "────────────────────────────"

          if [ "$PASS_RATE" -lt "$MIN_PASS_RATE" ]; then
            echo "❌ Below ${MIN_PASS_RATE}% threshold — pipeline failed"
            exit 1
          fi

          echo "✅ Passed quality gate at ${PASS_RATE}%"

  # ──────────────────────────────────────────────────────
  # JOB 3: BUILD JAR — runs on ALL branches and PRs
  # ──────────────────────────────────────────────────────
  build:
    name: Build JAR Artifact
    runs-on: ubuntu-latest
    needs: quality-gate

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sportsbook
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7.0
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build JAR
        run: |
          echo "=== Building JAR ==="
          mvn -B package -DskipTests --file pom.xml
          echo "=== Build complete ==="
        env:
          APP_PORT: ${{ secrets.APP_PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MAILGUN_BASE_URL: ${{ secrets.MAILGUN_BASE_URL }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_SANDBOX: ${{ secrets.MAILGUN_SANDBOX }}
          MAILGUN_FROM: ${{ secrets.MAILGUN_FROM }}
          CHAPA_BASE_URL: ${{ secrets.CHAPA_BASE_URL }}
          CHAPA_SECRET_KEY: ${{ secrets.CHAPA_SECRET_KEY }}
          CHAPA_WEBHOOK_SECRET: ${{ secrets.CHAPA_WEBHOOK_SECRET }}
          CHAPA_CURRENCY: ETB
          CHAPA_CALLBACK_URL: http://localhost:8080/api/wallet/webhook/chapa
          CHAPA_RETURN_URL: http://localhost:3000/deposit/success

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-jar
          path: target/*.jar
          retention-days: 7

  # ──────────────────────────────────────────────────────
  # JOB 4: BUILD AND PUSH DOCKER IMAGE
  # ONLY runs when code is merged/pushed to main
  # Builds ONCE and pushes in the SAME job on the SAME runner
  # ──────────────────────────────────────────────────────
  docker-build-push:
    name: Build & Push Docker Image to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    # KEY::only run this job when push lands on main
    # feat/* and fix/* branches stop at build job
    # PRs stop at build job
    # only a merge/push to main continues to this job
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download the JAR built in the build job
      # so Docker image uses the EXACT same artifact that was tested
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: api-gateway-jar
          path: target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build ONCE and push in the SAME step on the SAME runner
      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true           # ← builds and pushes in one step
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          cache-from: type=gha   # use GitHub Actions cache for faster builds
          cache-to: type=gha,mode=max

      - name: Verify pushed image
        run: |
          echo "Image pushed successfully"
          echo "   → ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest"
          echo "   → ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}"

  # ──────────────────────────────────────────────────────
  # JOB 5: SUMMARY — always runs, shows final status
  # ──────────────────────────────────────────────────────
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [test, quality-gate, build, docker-build-push]
    if: always()

    steps:
      - name: Print pipeline result
        run: |
          echo "──────────────────────────────────────"
          echo "  Pipeline Summary"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Event : ${{ github.event_name }}"
          echo "──────────────────────────────────────"
          echo "  Test job        : ${{ needs.test.result }}"
          echo "  Quality gate    : ${{ needs.quality-gate.result }}"
          echo "  Build job       : ${{ needs.build.result }}"
          echo "  Docker push     : ${{ needs.docker-build-push.result }}"
          echo "──────────────────────────────────────"
          if [ "${{ needs.docker-build-push.result }}" == "skipped" ]; then
            echo "  Docker push skipped — not a push to main"
          fi