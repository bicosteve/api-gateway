name: CICD

on:
  push:
    branches:
      - main
      - "feat/*"
      - "fix/*"
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (commit SHA) to deploy. Defaults to 'latest'."
        required: false
        default: "latest"
        type: string

env:
  # Build Configs
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: "temurin"
  DOCKER_IMAGE: bixoloo/api-gateway
  DOCKER_IMAGE_NAME: api-gateway


jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'

    env:
      # CI/test Database
      DB_URL: jdbc:mysql://127.0.0.1:3306/sportsbook?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      SQL_MODE: always

      # CI/test Redis
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379

      # App/test config
      APP_LOGGING: INFO
      LOGGING_LEVEL: INFO
      ACCESS_TOKEN_EXPIRATION: 3600000
      REFRESH_TOKEN_EXPIRATION: 604800000

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sportsbook
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7.0
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Make Maven wrapper executable if present
        run: |
          if [ -f mvnw ]; then
            chmod +x mvnw
          fi

      - name: Run Tests
        run: |
          set -o pipefail
          echo "==== Running Tests ===="
          mvn clean test \
            -Dmaven.test.failure.ignore=true \
            -B \
            --file pom.xml \
            2>&1 | tee test-output.log
          echo "==== Test Execution Complete ===="
        env:
          # Use dummy values in the CI instead of real production values
          APP_PORT: 5001
          JWT_SECRET: test-jwt-secret-for-ci-only

          MAILGUN_BASE_URL: http://localhost
          MAILGUN_API_KEY: test-mailgun-api-key
          MAILGUN_SANDBOX: test-mailgun-sandbox
          MAILGUN_FROM: no-reply@example.com

          CHAPA_BASE_URL: http://localhost
          CHAPA_SECRET_KEY: test-chapa-secret
          CHAPA_WEBHOOK_SECRET: test-chapa-webhook-secret
          CHAPA_CURRENCY: ETB
          CHAPA_CALLBACK_URL: http://localhost:8080/api/wallet/webhook/chapa
          CHAPA_RETURN_URL: http://localhost:3000/deposit/success

      - name: Show Surefire Reports
        if: always()
        run: |
          echo "==== XML TEST SUMMARY ===="
          if ls target/surefire-reports/TEST-*.xml >/dev/null 2>&1; then
            for f in target/surefire-reports/TEST-*.xml; do
              echo ""
              echo "FILE: $f"
              grep "<testsuite " "$f" || true
            done
          else
            echo "No Surefire XML reports found"
          fi

      - name: Upload Surefire Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 1
          if-no-files-found: warn

      - name: Upload Maven test output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maven-test-output
          path: test-output.log
          retention-days: 1
          if-no-files-found: warn


  quality-gate:
    name: Quality Gate | 100% Passed Executed Tests
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Download test reports
        uses: actions/download-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      - name: Evaluate test pass rate
        run: |
          MIN_PASS_RATE=100
          REPORTS_DIR="target/surefire-reports"

          echo "==== Scanning test reports ===="

          TOTAL_TESTS=0
          TOTAL_FAILURES=0
          TOTAL_ERRORS=0
          TOTAL_SKIPPED=0

          for xml in "$REPORTS_DIR"/TEST-*.xml; do
            [ -f "$xml" ] || continue
            TESTS=$(awk -F'tests="' '/tests="/ {split($2,a,"\""); if (a[1] > 0) print a[1]}' "$xml" | awk '{sum+=$1} END {print sum+0}')
            FAILURES=$(awk -F'failures="' '/failures="/ {split($2,a,"\""); if (a[1] ~ /^[0-9]+$/) sum+=a[1]} END {print sum+0}' "$xml")
            ERRORS=$(awk -F'errors="' '/errors="/ {split($2,a,"\""); if (a[1] ~ /^[0-9]+$/) sum+=a[1]} END {print sum+0}' "$xml")
            SKIPPED=$(awk -F'skipped="' '/skipped="/ {split($2,a,"\""); if (a[1] ~ /^[0-9]+$/) sum+=a[1]} END {print sum+0}' "$xml")
          
            TOTAL_TESTS=$((TOTAL_TESTS + TESTS))
            TOTAL_FAILURES=$((TOTAL_FAILURES + FAILURES))
            TOTAL_ERRORS=$((TOTAL_ERRORS + ERRORS))
            TOTAL_SKIPPED=$((TOTAL_SKIPPED + SKIPPED))
          done

          EFFECTIVE_TESTS=$((TOTAL_TESTS - TOTAL_SKIPPED))

          if [ "$TOTAL_TESTS" -eq 0 ]; then
            echo "::ERROR::No valid tests detected"
            exit 1
          fi
          
          if [ "$EFFECTIVE_TESTS" -eq 0 ]; then
            echo "::ERROR::No executed tests detected. All tests were skipped."
            exit 1
          fi

          PASSED=$((EFFECTIVE_TESTS - TOTAL_FAILURES - TOTAL_ERRORS))
          PASS_RATE=$((PASSED * 100 / EFFECTIVE_TESTS))

          echo "────────────────────────────"
          echo "Total Tests : $TOTAL_TESTS"
          echo "Skipped : $TOTAL_SKIPPED"
          echo "Executed : $EFFECTIVE_TESTS"
          echo "Passed : $PASSED"
          echo "Failures : $TOTAL_FAILURES"
          echo "Errors : $TOTAL_ERRORS"
          echo "Pass Rate : ${PASS_RATE}%"
          echo "Required : ${MIN_PASS_RATE}%"
          echo "────────────────────────────"

          if [ "$PASS_RATE" -lt "$MIN_PASS_RATE" ]; then
            echo "::ERROR::Below ${MIN_PASS_RATE}% threshold — pipeline failed"
            exit 1
          fi

          echo "Passed quality gate with ${PASS_RATE}%"

  build:
    name: Build JAR Artifact
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 15
    if: github.event_name != 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Make Maven wrapper executable if present
        run: |
          if [ -f mvnw ]; then
            chmod +x mvnw
          fi

      - name: Build JAR
        run: |
          echo "==== Building JAR ===="
          mvn -B package -DskipTests --file pom.xml
          echo "==== Build complete ===="
        env:
          # Use safe CI values. Build skips tests, so real external credentials should not be needed.
          APP_PORT: 8080
          JWT_SECRET: test-jwt-secret-for-ci-only

          MAILGUN_BASE_URL: http://localhost
          MAILGUN_API_KEY: test-mailgun-api-key
          MAILGUN_SANDBOX: test-mailgun-sandbox
          MAILGUN_FROM: no-reply@example.com

          CHAPA_BASE_URL: http://localhost
          CHAPA_SECRET_KEY: test-chapa-secret
          CHAPA_WEBHOOK_SECRET: test-chapa-webhook-secret
          CHAPA_CURRENCY: ETB
          CHAPA_CALLBACK_URL: http://localhost:8080/api/wallet/webhook/chapa
          CHAPA_RETURN_URL: http://localhost:3000/deposit/success

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-jar
          path: target/*.jar
          retention-days: 1
          if-no-files-found: error


  docker-build-push:
    name: Build & Push Docker Image to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    # Push build images only on push to main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download the JAR built in the build job
      # so Docker image uses the EXACT same artifact that was tested
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: api-gateway-jar
          path: target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build ONCE and push in the SAME step on the SAME runner
      - name: Build & Push Image to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify pushed image
        run: |
          echo "****Image pushed successfully****"
          echo "   → ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest"
          echo "   → ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}"


  deploy:
    name: Deploy to EC2/VM
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Manual trigger only, and only from main branch.
    # Deploys existing image tag from Docker Hub.
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="latest"
          fi
          
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Will deploy image tagged: $TAG"

      - name: Ensure deployment directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            DEPLOY_DIR=${{ secrets.DEPLOY_PATH }}
            
            if [ -d "${DEPLOY_DIR}" ]; then
              echo "Deploy directory exists: ${DEPLOY_DIR}"
            else
              echo "Deploy directory does not exist. Creating it ..."
              mkdir -p "${DEPLOY_DIR}"
            fi 
            
            if [ -d "${DEPLOY_DIR}/alloy" ]; then
              echo "Alloy directory exists: ${DEPLOY_DIR}/alloy"
            else
              echo "Alloy directory does not exist. Creating it..."
              mkdir -p "${DEPLOY_DIR}/alloy"
            fi
            
            echo "Directory ready: "
            ls -la "${DEPLOY_DIR}"

      - name: Copy the deployment files to the VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          source: "docker-compose.prod.yml,alloy/config.alloy"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Pull the image and restart the stack
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          envs: IMAGE_TAG,DOCKER_IMAGE,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            cd "${DEPLOY_PATH}"

            if [ ! -f .env ]; then
              echo "::ERROR::.env not found in ${DEPLOY_PATH}. Create it before deploying."
              exit 1
            fi
            
            # Make the resolved image tag available to docker-compose
            export DOCKER_IMAGE="${DOCKER_IMAGE}"
            export IMAGE_TAG="${IMAGE_TAG:-latest}"
            
            echo "Image to deploy: ${DOCKER_IMAGE}:${IMAGE_TAG}"

            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

            echo "Pulling image tag '${IMAGE_TAG}' from Docker Hub..."
            docker compose -f docker-compose.prod.yml --env-file .env pull

            echo "Starting/recreating stack..."
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans

            echo "Restarting Alloy to reload config..."
            docker compose -f docker-compose.prod.yml --env-file .env restart alloy || true

            echo "Pruning dangling images..."
            docker image prune -f

            echo "Current status:"
            docker compose -f docker-compose.prod.yml --env-file .env ps

            echo "Recent api-gateway logs:"
            docker logs api-gateway --tail=30 || true

            echo "Recent Alloy logs:"
            docker logs api-gateway-alloy --tail=30 || true

            echo "Logging out of Docker Hub..."
            docker logout || true

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs:
      - test
      - quality-gate
      - build
      - docker-build-push
      - deploy
    if: always()

    steps:
      - name: Print pipeline result
        run: |
          echo "──────────────────────────────────────"
          echo " Pipeline Summary"
          echo " Branch: ${{ github.ref_name }}"
          echo " Event : ${{ github.event_name }}"
          echo "──────────────────────────────────────"
          echo " Test job     : ${{ needs.test.result }}"
          echo " Quality gate : ${{ needs.quality-gate.result }}"
          echo " Build job    : ${{ needs.build.result }}"
          echo " Docker push  : ${{ needs.docker-build-push.result }}"
          echo " Deploy job   : ${{ needs.deploy.result }}"
          echo "──────────────────────────────────────"
          
          if [ "${{ needs.docker-build-push.result }}" == "skipped" ]; then
            echo " Docker push skipped — not a push to main"
          fi
          if [ "${{ needs.deploy.result }}" == "skipped" ]; then
            echo " Deploy skipped — manual trigger from main required"
          fi
