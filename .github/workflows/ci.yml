name: Api Gateway CI

on:
    push:
        branches:
          - main
          - dev
          - "feat/*"
          - "fix/*"


    pull_request:
       branches:
         - dev
         - main

jobs:
     build:
         runs-on: ubuntu-latest

         steps:
           # STEP 1: Checkout repository
           - name: Checkout code
             uses: actions/checkout@v4

          # STEP 2: Set up JDK
           - name: Set up JDK 21
             uses: actions/setup-java@v4
             with:
               java-version: "21"
               distribution: "temurin"
               cache: maven
